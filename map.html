    <script>
    (function() {
      const MAP_VAR = "map_6ef4e97d09467eb9680015a1666d6ead";

      function initDynamicLayer() {
        const MAP = window[MAP_VAR];
        if (!MAP || typeof MAP.getBounds !== "function") {
          setTimeout(initDynamicLayer, 200);
          return;
        }

        const pointsLayer = L.layerGroup().addTo(MAP);
        let t = null;

        function loadPoints() {
          const b = MAP.getBounds();
          const z = MAP.getZoom();

          const min_lat = b.getSouth();
          const max_lat = b.getNorth();
          const min_lon = b.getWest();
          const max_lon = b.getEast();

          fetch(`/get_points?min_lat=${min_lat}&max_lat=${max_lat}&min_lon=${min_lon}&max_lon=${max_lon}&zoom=${z}`)
            .then(r => r.json())
            .then(data => {
              pointsLayer.clearLayers();

              data.forEach(p => {
                if (p.count !== undefined) {
                  L.circleMarker([p.lat, p.lon], {
                    radius: Math.min(25, 6 + Math.log(p.count + 1)),
                    fillOpacity: 0.6,
                    weight: 1
                  }).bindPopup("Count: " + p.count).addTo(pointsLayer);
                } else {
                  L.circleMarker([p.lat, p.lon], {
                    radius: 4,
                    fillOpacity: 0.7,
                    weight: 0
                  }).addTo(pointsLayer);
                }
              });
            })
            .catch(err => console.error("get_points error:", err));
        }

        function delayedLoad() {
          clearTimeout(t);
          t = setTimeout(loadPoints, 300);
        }

        MAP.on("moveend", delayedLoad);
        MAP.on("zoomend", delayedLoad);
        loadPoints();
      }

      initDynamicLayer();
    })();
    </script>
